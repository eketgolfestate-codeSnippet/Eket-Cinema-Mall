<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eket Cinema Mall</title>
    <link rel="shortcut icon" href="/images/cinema logo one rb.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --ink: #0d0c0b;
            --wine: #5c1a24;
            --gold: #0d6efd;
            --accent: #0d6efd;
            --cream: #f4efe6;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: var(--ink);
            height: 100vh;
        }

        .loading-screen {
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }


        .bg-image {
            background: url("/images/Screenshot_20260709-095339.jpg") center center / cover no-repeat;
            opacity: 0.35;

        }

        .bg-overlay {
            background: linear-gradient(180deg,
                    rgba(13, 12, 11, 0.55) 0%,
                    rgba(13, 12, 11, 0.72) 60%,
                    rgba(13, 12, 11, 0.90) 100%);
        }

        .loading-content {
            max-width: 520px;
        }

        .eyebrow {

            color: var(--accent);
            font-size: 20px;
        }


        .loader-wrapper {
            width: 132px;
            height: 132px;
        }

        .loader-ring {
            border: 3px solid rgba(244, 239, 230, 0.15);
        }

        .loader-ring::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 10px solid transparent;
            border-top-color: var(--accent);
            animation: spin 1.4s linear infinite;
        }

        .logo-holder {
            width: 96px;
            height: 96px;
            background: var(--cream);
            padding: 5px;
        }

        .logo {
            object-fit: cover;
        }

        /* ============ TEXT ============ */
        .welcome-title {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 800;
            color: var(--cream);
        }

        .welcome-title em {
            font-style: normal;
            color: var(--gold);
            font-family: Arial, Helvetica, sans-serif;
        }

        .welcome-subtitle {
            color: rgba(244, 239, 230, 0.75);
        }

        .divider {
            width: 44px;
            height: 3px;
            background: var(--accent);
        }

        .loading-text {
            letter-spacing: 0.16em;
            color: var(--cream);
        }

        .dots::after {
            content: "";
            display: inline-block;
            width: 1.1em;
            text-align: left;
            animation: dots 1.4s steps(4, end) infinite;
        }

        .progress-track {
            width: 220px;
            height: 10px;
        }

        .progress-fill {
            width: 0%;
            background: var(--accent);
            transition: width 0.2s linear;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes dots {

            0%,
            100% {
                content: "";
            }

            25% {
                content: ".";
            }

            50% {
                content: "..";
            }

            75% {
                content: "...";
            }
        }

        @media (max-width: 575.98px) {
            .welcome-title {
                font-size: 1.6rem !important;
            }

            .loader-wrapper {
                width: 104px;
                height: 104px;
            }

            .logo-holder {
                width: 76px;
                height: 76px;
            }

            .progress-track {
                width: 170px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .loader-ring::before,
            .dots::after {
                animation: none;
            }
        }



        /* ============ CONTACT BAR ============ */
        .contact-bar {
            color: rgba(244, 239, 230, 0.85);
        }

        .contact-item {
            color: rgba(244, 239, 230, 0.9);
            white-space: nowrap;
        }

        .contact-icon {
            color: var(--accent);
            vertical-align: -2px;
        }

        .contact-item a {
            color: inherit;
            text-decoration: none;
        }

        .contact-item a:hover {
            color: var(--gold);
        }

        @media (max-width: 575.98px) {
            .welcome-title {
                font-size: 1.6rem !important;
            }

            .loader-wrapper {
                width: 104px;
                height: 104px;
            }

            .logo-holder {
                width: 76px;
                height: 76px;
            }

            .progress-track {
                width: 170px;
            }

            .contact-bar {
                gap: 0.75rem !important;
            }

            .contact-item {
                font-size: 0.75rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .loader-ring::before,
            .dots::after {
                animation: none;
            }

        }
    </style>
</head>

<body>

    <div class="loading-screen position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center p-3"
        id="loadingScreen">

        <div class="bg-image position-fixed top-0 start-0 w-100 h-100"></div>
        <div class="bg-overlay position-fixed top-0 start-0 w-100 h-100"></div>

        <div class="loading-content position-relative text-center w-100 px-3">

            <p class="eyebrow fw-bold text-uppercase mb-4 fs-1">Eket Cinema Mall</p>


            <div class="loader-wrapper position-relative d-flex align-items-center justify-content-center mx-auto mb-4">
                <div class="loader-ring position-absolute top-0 start-0 w-100 h-100 rounded-circle"></div>
                <div
                    class="logo-holder position-relative rounded-circle d-flex align-items-center justify-content-center">
                    <img src="/images/IMG-20260713-WA0003-removebg-preview.png" alt="9ja Cinema Grill logo"
                        class="logo w-100 h-100 rounded-circle">
                </div>
            </div>

            <h1 class="welcome-title fw-bold fs-1 mb-2">Shop <em>. Movies</em>. Enjoy</h1>
            <p class="welcome-subtitle fw-semibold mb-4"> 🛍️ Shop. 🎬 Movies. ❤️ Enjoy.</p>

            <div class="divider mx-auto mb-4 rounded-pill"></div>

            <p class="loading-text fw-bold text-uppercase mb-3">
                Loading your experience<span class="dots"></span>
            </p>

            <div class="progress-track mx-auto bg-white bg-opacity-25 rounded-pill overflow-hidden position-relative">
                <div class="progress-fill position-absolute top-0 start-0 h-100 rounded-pill" id="progressFill"></div>
            </div>





        </div>


        <!-- CONTACT INFO -->
        <div
            class="contact-bar position-absolute bottom-0 start-0 w-100 d-flex flex-wrap align-items-center justify-content-center gap-4 pb-4 px-3">
            <span class="contact-item fw-bold small">
                <svg class="contact-icon me-1" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.678.678 0 0 0 .178.643l2.457 2.457a.678.678 0 0 0 .644.178l2.189-.547a1.745 1.745 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877L1.885.511Z" />
                </svg>
                <a href="tel:+2348000000000">08037719003</a>
            </span>
            <span class="contact-item fw-bold small">
                <svg class="contact-icon me-1" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757Zm3.436-.586L16 11.801V4.697l-5.803 3.546Z" />
                </svg>
                <a href="mailto:info@9jacinemagrill.com">info@eketcinemamall.com</a>
            </span>
            <span class="contact-item fw-bold small">
                <svg class="contact-icon me-1" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10Zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z" />
                </svg>
                Eket, Akwa Ibom
            </span>
        </div>
    </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const loadingScreen = document.getElementById("loadingScreen");
        const progressFill = document.getElementById("progressFill");

        const displayTime = 10000;
        const start = performance.now();

        function tick(now) {
            const pct = Math.min(100, ((now - start) / displayTime) * 100);
            progressFill.style.width = pct + "%";
            if (pct < 100) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        setTimeout(() => {
            loadingScreen.classList.add("fade-out");
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 500);
        }, displayTime);
    </script>

</body>

</html>
